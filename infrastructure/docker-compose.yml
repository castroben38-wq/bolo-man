version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: boloman-postgres
    environment:
      POSTGRES_DB: boloman
      POSTGRES_USER: boloman
      POSTGRES_PASSWORD: boloman_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boloman']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: boloman-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: boloman-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@boloman.cm
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
