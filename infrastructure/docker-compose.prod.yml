version: '3.8'

services:
  # ─── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: boloman-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: boloman
      POSTGRES_USER: boloman
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boloman_secret_change_me}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boloman']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boloman-network

  redis:
    image: redis:7-alpine
    container_name: boloman-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_change_me}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boloman-network

  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: boloman-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      DATABASE_URL: postgresql://boloman:${POSTGRES_PASSWORD:-boloman_secret_change_me}@postgres:5432/boloman?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_change_me}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-256-bit-secret-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-to-another-256-bit-secret}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      DEFAULT_COUNTRY_CODE: CM
      DEFAULT_CURRENCY: XAF
      DEFAULT_LANGUAGE: fr
      # Payment gateways (add real credentials in .env)
      MOMO_BASE_URL: ${MOMO_BASE_URL:-https://sandbox.momodeveloper.mtn.com}
      MOMO_SUBSCRIPTION_KEY: ${MOMO_SUBSCRIPTION_KEY:-}
      MOMO_API_USER: ${MOMO_API_USER:-}
      MOMO_API_KEY: ${MOMO_API_KEY:-}
      ORANGE_MONEY_BASE_URL: ${ORANGE_MONEY_BASE_URL:-https://api.orange.com}
      ORANGE_MONEY_CLIENT_ID: ${ORANGE_MONEY_CLIENT_ID:-}
      ORANGE_MONEY_CLIENT_SECRET: ${ORANGE_MONEY_CLIENT_SECRET:-}
      FLUTTERWAVE_BASE_URL: ${FLUTTERWAVE_BASE_URL:-https://api.flutterwave.com/v3}
      FLUTTERWAVE_PUBLIC_KEY: ${FLUTTERWAVE_PUBLIC_KEY:-}
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY:-}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - boloman-network

  # ─── Admin Dashboard ────────────────────────────────────────────────────────
  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: boloman-admin
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - boloman-network

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: boloman-nginx
    restart: unless-stopped
    ports:
      - '8080:8080'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - admin
    networks:
      - boloman-network

volumes:
  postgres_data:
  redis_data:

networks:
  boloman-network:
    driver: bridge
