name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: boloman
          POSTGRES_PASSWORD: boloman_secret
          POSTGRES_DB: boloman_test
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run build
      - run: npm run test:cov
        env:
          DATABASE_URL: postgresql://boloman:boloman_secret@localhost:5432/boloman_test
          REDIS_HOST: localhost
          JWT_SECRET: test-secret
      - run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://boloman:boloman_secret@localhost:5432/boloman_test

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'admin/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
